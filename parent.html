<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>おうちの人 — 子ども勉強管理</title>
<style>
  :root{ --bg:#f6f8fb; --card:#fff; --line:#e4e9f0; --ink:#1f2b39; --mut:#7a8aa0; --accent:#ff8c42; --good:#37b87c; --hard:#e8604c; }
  *{box-sizing:border-box}
  body{font-family:system-ui,-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;margin:0;background:var(--bg);color:var(--ink)}
  header{display:flex;align-items:center;gap:10px;padding:14px 18px;background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5}
  header h1{font-size:17px;margin:0;font-weight:800}
  header .sp{flex:1}
  .who{font-size:12px;color:var(--mut)}
  main{max-width:780px;margin:0 auto;padding:18px}
  button{font-family:inherit;font-size:15px;border-radius:10px;border:1px solid var(--line);background:var(--card);color:var(--ink);padding:9px 14px;cursor:pointer}
  button.primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700}
  button.ghost{background:transparent}
  button.danger{color:var(--hard);border-color:#f3c9c2}
  button:disabled{opacity:.5;cursor:default}
  .center{min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center}
  .muted{color:var(--mut);font-size:14px}
  .hidden{display:none!important}
  .sec-title{font-size:13px;color:var(--mut);font-weight:700;margin:6px 2px 10px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
  .ccard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:8px}
  .ctop{display:flex;align-items:center;gap:10px}
  .avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px;flex:none}
  .cname{font-weight:800;font-size:16px}
  .cmeta{font-size:12px;color:var(--mut)}
  .crow{display:flex;gap:8px;margin-top:2px}
  .crow button{font-size:13px;padding:6px 10px}
  .addcard{border:2px dashed var(--line);background:transparent;border-radius:14px;display:flex;align-items:center;justify-content:center;min-height:120px;color:var(--mut);font-weight:700;cursor:pointer}
  .addcard:hover{border-color:var(--accent);color:var(--accent)}
  dialog{border:none;border-radius:16px;padding:0;max-width:380px;width:92%;box-shadow:0 20px 60px rgba(20,30,50,.25)}
  .dlg{padding:18px}
  .dlg h3{margin:0 0 14px;font-size:17px}
  label{display:block;font-size:12px;color:var(--mut);margin:10px 0 4px}
  input[type=text],input[type=password],select{width:100%;font-size:16px;padding:10px;border:1px solid var(--line);border-radius:10px;font-family:inherit;background:#fff}
  input[type=file]{width:100%;font-size:14px;margin-top:2px}
  .swatches{display:flex;gap:8px;flex-wrap:wrap}
  .sw{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent}
  .sw.on{border-color:#1f2b39}
  .dlg-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#1f2b39;color:#fff;padding:10px 16px;border-radius:10px;font-size:14px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:50}
  .toast.show{opacity:1}
  .err{color:var(--hard);font-size:13px;white-space:pre-wrap}
  .pv{position:fixed;inset:0;background:var(--bg);z-index:70;overflow:auto;padding:16px}
  .pvhead{display:flex;align-items:center;gap:10px;position:sticky;top:-16px;background:var(--bg);padding:10px 0;margin:-16px 0 4px;z-index:1;flex-wrap:wrap}
  .pvhead .sp{flex:1}
  .pvgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:10px;margin:6px 0 18px}
  .pvthumb{position:relative;border:2px solid var(--line);border-radius:8px;overflow:hidden;cursor:pointer;background:#fff}
  .pvthumb img{display:block;width:100%}
  .pvthumb .pnum{position:absolute;top:3px;left:4px;font-size:11px;background:rgba(20,30,50,.6);color:#fff;padding:0 6px;border-radius:6px}
  .pvthumb.ex{opacity:.45}
  .pvthumb.ex::after{content:'除外';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--hard);background:rgba(255,255,255,.45)}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>if(window.pdfjsLib)pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
</head>
<body>
<header>
  <h1>👪 おうちの人ページ</h1>
  <span class="sp"></span>
  <span class="who hidden" id="who"></span>
  <button class="ghost hidden" id="bSettings" style="font-size:13px;padding:6px 10px">⚙ AI設定</button>
  <button class="ghost hidden" id="bOut" style="font-size:13px;padding:6px 10px">ログアウト</button>
</header>
<main>
  <!-- 未ログイン -->
  <section id="vLogin" class="center">
    <div style="font-size:40px">🔐</div>
    <div class="muted">教材の登録や子どもの管理を行います。<br>Googleでログインしてください。</div>
    <button class="primary" id="bIn">Googleでログイン</button>
    <div class="err" id="loginErr"></div>
  </section>

  <!-- ログイン後 -->
  <section id="vHome" class="hidden">
    <div class="sec-title">こども（学習する人）</div>
    <div class="grid" id="childGrid"></div>
    <div class="sec-title" style="margin-top:24px">教材（ライブラリ・みんなで共有）</div>
    <div class="grid" id="bookGrid"></div>
  </section>
</main>

<dialog id="childDlg">
  <form method="dialog" class="dlg" id="childForm">
    <h3 id="dlgTitle">こどもを ふやす</h3>
    <label>なまえ</label>
    <input type="text" id="fName" maxlength="12" placeholder="例：はなこ" autocomplete="off">
    <label>いろ</label>
    <div class="swatches" id="swatches"></div>
    <label>あいことば（任意・4けた数字）<span class="muted">この子の画面に入るとき用</span></label>
    <input type="password" id="fPin" inputmode="numeric" maxlength="4" placeholder="なくてもOK" autocomplete="off">
    <div class="err" id="dlgErr"></div>
    <div class="dlg-actions">
      <button type="button" class="ghost" id="bCancel">やめる</button>
      <button type="button" class="primary" id="bSave">ほぞん</button>
    </div>
  </form>
</dialog>

<dialog id="bookDlg">
  <form method="dialog" class="dlg">
    <h3>教材を とうろく</h3>
    <label>教材の名前</label>
    <input type="text" id="bTitle" maxlength="40" placeholder="例：論理エンジン 小4" autocomplete="off">
    <label>教科</label>
    <select id="bSubject">
      <option>国語</option><option>算数</option><option>理科</option><option>社会</option><option>英語</option><option>その他</option>
    </select>
    <label>タイプ</label>
    <select id="bType">
      <option value="reps">反復（算数・漢字など くり返す）</option>
      <option value="reading">読解（長文）</option>
      <option value="writing">記述・作文</option>
    </select>
    <label>もんだいのファイル（PDF か 写真・複数えらべる）</label>
    <input type="file" id="bFiles" accept="application/pdf,image/*" multiple>
    <label>こたえのファイル（任意・PDFか写真）</label>
    <input type="file" id="bAnsFiles" accept="application/pdf,image/*" multiple>
    <div class="err" id="bErr"></div>
    <div class="muted" id="bProg" style="margin-top:8px"></div>
    <div class="dlg-actions">
      <button type="button" class="ghost" id="bImpCancel">やめる</button>
      <button type="button" class="primary" id="bImpGo">とうろく</button>
    </div>
  </form>
</dialog>

<dialog id="setDlg">
  <form method="dialog" class="dlg">
    <h3>AI設定（この端末だけに保存）</h3>
    <label>Claude APIキー</label>
    <input type="password" id="sKey" placeholder="sk-ant-..." autocomplete="off">
    <label>モデル</label>
    <select id="sModel">
      <option value="claude-sonnet-4-6">claude-sonnet-4-6（高精度・おすすめ）</option>
      <option value="claude-haiku-4-5">claude-haiku-4-5（安価・精度は落ちる）</option>
    </select>
    <p class="muted" style="margin-top:8px">読み取りが甘い時は <b>sonnet</b> にしてください（特に算数の図・マッチング問題）。キーはこの端末のブラウザにのみ保存され、Drive・GitHubには出ません。教材の解析時だけ使います。</p>
    <div class="dlg-actions">
      <button type="button" class="ghost" id="sCancel">とじる</button>
      <button type="button" class="primary" id="sSave">ほぞん</button>
    </div>
  </form>
</dialog>

<div id="bookView" class="pv hidden">
  <div class="pvhead">
    <button class="ghost" id="bvBack">← もどる</button>
    <strong id="bvTitle" style="font-size:15px"></strong>
    <span class="sp"></span>
    <button id="bvEdit">✏️ 編集</button>
    <button id="bvSave" class="primary hidden">保存</button>
    <button id="bvAnalyze">AIで解析する</button>
  </div>
  <div id="bvMeta" class="muted" style="margin:2px 0 12px"></div>
  <div class="sec-title">もんだいの構造（AIが読み取った内容・ここで確認できます）</div>
  <div id="bvUnits"></div>
  <div class="sec-title" style="margin-top:20px">ページの画像</div>
  <button id="bvLoadPages" class="ghost" style="margin-bottom:10px">ページ画像をみる</button>
  <div class="pvgrid" id="bvPages"></div>
</div>

<div id="importPreview" class="pv hidden">
  <div class="pvhead">
    <button class="ghost" id="pvCancel">やめる</button>
    <strong id="pvTitle" style="font-size:15px"></strong>
    <span class="sp"></span>
    <span class="muted" style="font-size:12px">不要なページ（表紙・もくじ・白紙・巻末など）をタップで除外</span>
    <button class="primary" id="pvGo">とうろく</button>
  </div>
  <div class="sec-title">もんだい ページ</div>
  <div class="pvgrid" id="pvProb"></div>
  <div class="sec-title" id="pvAnsTitle">こたえ ページ</div>
  <div class="pvgrid" id="pvAns"></div>
</div>

<div id="aiBanner" class="hidden" style="position:fixed;left:0;right:0;bottom:0;background:#1f2b39;color:#fff;padding:13px 16px;text-align:center;z-index:60;font-size:14px"></div>

<div class="toast" id="toast"></div>

<script type="module">
import { CONFIG } from './core/config.js';
import { initAuth, requestToken, signOut, hasToken } from './core/auth.js';
import { loadOrInitJSON, writeJSON } from './core/drive.js';
import { emptyFamily, addChild, removeChild, updateChild, newId } from './core/family.js';
import { ensureFolder, createBinaryFile, readBase64 } from './core/drive.js';
import { filesToPages } from './core/pdf.js';
import { today } from './core/sm2.js';
import { detectStructure, extractAnswers } from './core/ai.js';

const $ = (id) => document.getElementById(id);
const COLORS = ['#ff8c42','#37b87c','#4a90d9','#e8604c','#9b59b6','#f0a500','#1ab59b','#ef6aa6'];

let family = null, familyFileId = null, editingId = null, pickedColor = COLORS[0];
let libFolderId = null, assetsFolderId = null, booksFileId = null, books = [], importing = false;

function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800); }
function initials(name){ return (name||'?').trim().slice(0,1); }

async function saveFamily(){ if(!familyFileId) return; /* demoモードはDrive書込なし */ await writeJSON(familyFileId, family); }

function renderChildren(){
  const grid = $('childGrid'); grid.innerHTML = '';
  (family.children||[]).forEach(c => {
    const el = document.createElement('div'); el.className = 'ccard';
    const n = c.assignedBooks?.length || 0;
    el.innerHTML = `
      <div class="ctop">
        <div class="avatar" style="background:${c.color||'#888'}">${initials(c.name)}</div>
        <div>
          <div class="cname">${c.name}</div>
          <div class="cmeta">${c.pin?'🔒 あいことばあり':'あいことばなし'} ・ 教材 ${n===0?'ぜんぶ':n+'冊'}</div>
        </div>
      </div>
      <div class="crow">
        <button class="ghost" data-edit="${c.id}">なまえ・いろ</button>
        <button class="danger" data-del="${c.id}">けす</button>
      </div>`;
    grid.appendChild(el);
  });
  const add = document.createElement('div'); add.className='addcard'; add.id='addChildBtn';
  add.textContent = '＋ こどもを ふやす';
  add.onclick = () => openDlg(null);
  grid.appendChild(add);
  grid.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>openDlg(b.dataset.edit));
  grid.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>delChild(b.dataset.del));
}

function renderSwatches(){
  const wrap = $('swatches'); wrap.innerHTML='';
  COLORS.forEach(col=>{
    const s=document.createElement('div'); s.className='sw'+(col===pickedColor?' on':''); s.style.background=col;
    s.onclick=()=>{ pickedColor=col; renderSwatches(); };
    wrap.appendChild(s);
  });
}

function openDlg(id){
  editingId = id;
  const c = id ? family.children.find(x=>x.id===id) : null;
  $('dlgTitle').textContent = c ? 'なまえ・いろ を なおす' : 'こどもを ふやす';
  $('fName').value = c ? c.name : '';
  $('fPin').value = c ? (c.pin||'') : '';
  pickedColor = c ? (c.color||COLORS[0]) : COLORS[0];
  $('dlgErr').textContent='';
  renderSwatches();
  $('childDlg').showModal();
  setTimeout(()=>$('fName').focus(),50);
}

async function saveChild(){
  const name = $('fName').value.trim();
  const pin = $('fPin').value.trim();
  if(!name){ $('dlgErr').textContent='なまえを いれてね'; return; }
  if(pin && !/^\d{4}$/.test(pin)){ $('dlgErr').textContent='あいことばは 4けたの数字（または空）'; return; }
  $('bSave').disabled = true;
  try{
    if(editingId){ family = updateChild(family, editingId, { name, color:pickedColor, pin }); }
    else { family = addChild(family, { name, color:pickedColor, pin }).family; }
    await saveFamily();
    renderChildren();
    $('childDlg').close();
    toast(editingId?'なおしました':'ふやしました');
  }catch(e){ $('dlgErr').textContent='ほぞん失敗: '+e.message; }
  finally{ $('bSave').disabled=false; }
}

async function delChild(id){
  const c = family.children.find(x=>x.id===id); if(!c) return;
  if(!confirm(`「${c.name}」を けしますか？\n（この子の学習記録の参照も外れます）`)) return;
  try{ family = removeChild(family, id); await saveFamily(); renderChildren(); toast('けしました'); }
  catch(e){ alert('削除失敗: '+e.message); }
}

const TYPE_LABEL = { reps:'反復', reading:'読解', writing:'記述' };

async function resolveLibrary(){
  const lib = await ensureFolder(CONFIG.ROOT_FOLDER_ID, 'library');
  libFolderId = lib.id;
  const assets = await ensureFolder(libFolderId, 'assets');
  assetsFolderId = assets.id;
  const bj = await loadOrInitJSON(libFolderId, 'books.json', { books: [] });
  booksFileId = bj.id; books = bj.data.books || [];
}

function renderBooks(){
  const grid = $('bookGrid'); grid.innerHTML = '';
  (books||[]).forEach(b => {
    const el = document.createElement('div'); el.className = 'ccard';
    const np = b.sourcePageIds?.length || 0, na = b.answerPageIds?.length || 0;
    el.innerHTML = `
      <div class="cname">${b.title}</div>
      <div class="cmeta">${b.subject||''} ・ ${TYPE_LABEL[b.type]||b.type} ・ もんだい${np}ページ${na?` ・ こたえ${na}ページ`:''}</div>
      <div class="cmeta">${b.structured?('もんだい構造：解析ずみ（'+(b.unitCount||0)+'問）'):'もんだい構造：未解析'}</div>
      <div class="crow"><button data-ai="${b.id}">${b.structured?'AI解析しなおす':'AIで解析する'}</button></div>`;
    grid.appendChild(el);
  });
  const add = document.createElement('div'); add.className='addcard';
  add.textContent = '＋ 教材を とうろく';
  add.onclick = openBookDlg;
  grid.appendChild(add);
  grid.querySelectorAll('.ccard').forEach((el,i)=>{ el.style.cursor='pointer'; el.onclick=()=>openBookDetail(books[i]); });
  grid.querySelectorAll('[data-ai]').forEach(btn => btn.onclick = (e) => { e.stopPropagation(); analyzeBook(books.find(x => x.id === btn.dataset.ai)); });
}

/* ===== 教材の詳細プレビュー（ページ＋AI解析結果の確認） ===== */
let viewingBook = null, bvUnits = [], bvOthers = [], bvFileId = null, bvEditing = false;
function kindLabel(k){ return k==='figure'?'図で答える':(k==='writing'?'記述':'答えあり'); }
function esc(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function setEditUI(){ $('bvEdit').classList.toggle('hidden', bvEditing); $('bvSave').classList.toggle('hidden', !bvEditing); }
async function openBookDetail(book){
  viewingBook = book; bvEditing = false; setEditUI();
  $('bvTitle').textContent = book.title;
  $('bvMeta').textContent = `${book.subject||''}・${TYPE_LABEL[book.type]||book.type}・もんだい${book.sourcePageIds?.length||0}ページ${book.answerPageIds?.length?`・こたえ${book.answerPageIds.length}ページ`:''}`;
  $('bvAnalyze').textContent = book.structured ? 'AIで解析しなおす' : 'AIで解析する';
  $('bvPages').innerHTML = ''; $('bvLoadPages').style.display = '';
  $('bvUnits').innerHTML = '<div class="muted">読み込み中…</div>';
  $('bookView').classList.remove('hidden');
  try{
    if(libFolderId){ const uj = await loadOrInitJSON(libFolderId,'units.json',{units:[]}); bvFileId = uj.id; const all = uj.data.units||[]; bvUnits = all.filter(u=>u.bookId===book.id); bvOthers = all.filter(u=>u.bookId!==book.id); }
    else { bvFileId = null; bvUnits = JSON.parse(JSON.stringify((window.__demoUnits&&window.__demoUnits[book.id])||[])); bvOthers = []; }
    renderBookUnits();
  }catch(e){ $('bvUnits').innerHTML = '<div class="err">構造の読込に失敗: '+e.message+'</div>'; }
}
function renderBookUnits(){
  const us = bvUnits;
  if(!us.length && !bvEditing){ $('bvUnits').innerHTML = '<div class="muted">まだ解析されていません。上の「AIで解析する」を押すと、大問・小問・設問・解答・採点ポイントが読み取られ、ここに表示されます。</div>'; return; }
  if(!bvEditing){
    $('bvUnits').innerHTML = us.map((u,di)=>`
      <div class="ccard" style="margin-bottom:10px">
        <div class="cname">大問${di+1}：${esc(u.label)} <span class="cmeta">${esc(u.category)} ${(u.tags||[]).join('・')}</span></div>
        ${u.items.map((it,si)=>`
          <div style="border-top:1px solid var(--line);padding:8px 0;font-size:14px">
            <b>${esc(it.label)||('('+(si+1)+')')}</b>${it.question?('　'+esc(it.question)):''}
            ${it.evidence?`<div style="font-size:12px;color:#33536b;background:#eef4f9;border-radius:6px;padding:5px 8px;margin:4px 0">📖 本文の手がかり：${esc(it.evidence)}</div>`:''}
            <div style="color:${(typeof it.conf==='number'&&it.conf<0.6)?'var(--hard)':'var(--ink)'}">✓ こたえ：${esc(it.answer)||'（読み取れず）'} <span class="cmeta">[${kindLabel(it.kind)}${(typeof it.conf==='number'&&it.conf<0.6)?'・要確認':''}]</span></div>
            ${(it.points&&it.points.length)?`<div class="cmeta">採点ポイント：${it.points.map(p=>'・'+esc(p)).join(' ')}</div>`:''}
          </div>`).join('')}
      </div>`).join('');
    return;
  }
  // 編集モード
  $('bvUnits').innerHTML = us.map((u,di)=>`
    <div class="ccard" style="margin-bottom:10px">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:4px">
        <b style="white-space:nowrap">大問${di+1}</b>
        <input type="text" value="${esc(u.label)}" oninput="window.__bvSet(${di},-1,'label',this.value)" placeholder="大問のなまえ" style="flex:1;width:auto;min-width:0">
        <button class="danger" onclick="window.__bvDelUnit(${di})">大問を消す</button>
      </div>
      ${u.items.map((it,si)=>`
        <div style="border-top:1px solid var(--line);padding:8px 0">
          <div style="display:flex;gap:6px;align-items:center">
            <input type="text" value="${esc(it.label)}" oninput="window.__bvSet(${di},${si},'label',this.value)" placeholder="番号" style="width:64px">
            <input type="text" value="${esc(it.question)}" oninput="window.__bvSet(${di},${si},'question',this.value)" placeholder="設問（任意）" style="flex:1;width:auto;min-width:0">
            <button class="danger" onclick="window.__bvDelItem(${di},${si})">✕</button>
          </div>
          <div style="display:flex;gap:6px;align-items:center;margin-top:5px">
            <span class="muted" style="font-size:12px;white-space:nowrap">こたえ</span>
            <input type="text" value="${esc(it.answer)}" oninput="window.__bvSet(${di},${si},'answer',this.value)" placeholder="正解" style="flex:1;width:auto;min-width:0">
            <select onchange="window.__bvSet(${di},${si},'kind',this.value)" style="width:auto">
              <option value="value"${it.kind==='value'?' selected':''}>答えあり</option>
              <option value="writing"${it.kind==='writing'?' selected':''}>記述</option>
              <option value="figure"${it.kind==='figure'?' selected':''}>図で答える</option>
            </select>
          </div>
        </div>`).join('')}
      <button onclick="window.__bvAddItem(${di})" style="margin-top:6px">＋ 小問を追加</button>
    </div>`).join('') + `<button class="primary" onclick="window.__bvAddUnit()" style="margin-bottom:30px">＋ 大問を追加</button>`;
}
window.__bvSet = (di,si,k,v)=>{ if(si<0) bvUnits[di][k]=v; else bvUnits[di].items[si][k]=v; };
window.__bvDelItem = (di,si)=>{ bvUnits[di].items.splice(si,1); renderBookUnits(); };
window.__bvDelUnit = (di)=>{ if(confirm('この大問を消しますか？')){ bvUnits.splice(di,1); renderBookUnits(); } };
window.__bvAddItem = (di)=>{ bvUnits[di].items.push({label:'',question:'',evidence:'',answer:'',kind:'value',conf:1,points:[]}); renderBookUnits(); };
window.__bvAddUnit = ()=>{ bvUnits.push({ id:newId('u'), bookId:viewingBook.id, label:'', category:'', tags:[], pageId:(viewingBook.sourcePageIds&&viewingBook.sourcePageIds[0])||'', refPages:[], items:[{label:'',question:'',evidence:'',answer:'',kind:'value',conf:1,points:[]}] }); renderBookUnits(); };
async function saveBookUnits(){
  bvUnits = bvUnits.filter(u => (u.items||[]).length);
  if(libFolderId && bvFileId){
    try{ await writeJSON(bvFileId, { units:[...bvOthers, ...bvUnits] }); }catch(e){ alert('保存に失敗: '+e.message); return; }
    viewingBook.structured = bvUnits.length>0; viewingBook.unitCount = bvUnits.length;
    try{ await writeJSON(booksFileId, { books }); }catch(e){}
  } else if(window.__demoUnits){ window.__demoUnits[viewingBook.id] = bvUnits; }
  bvEditing = false; setEditUI(); renderBookUnits(); renderBooks(); toast('保存しました');
}
async function loadBookPages(){
  const b = viewingBook; if(!b) return;
  $('bvLoadPages').style.display = 'none';
  const grid = $('bvPages'); grid.innerHTML = '';

  for(let i=0;i<ids.length;i++){

/* ===== AI設定（APIキー：この端末のlocalStorageのみ） ===== */
function getApiKey(){ return localStorage.getItem('claudeApiKey') || ''; }
function getModel(){ return localStorage.getItem('claudeModel') || 'claude-haiku-4-5'; }
function openSettings(){ $('sKey').value = getApiKey(); $('sModel').value = getModel(); $('setDlg').showModal(); }
function saveSettings(){ localStorage.setItem('claudeApiKey', $('sKey').value.trim()); localStorage.setItem('claudeModel', $('sModel').value); $('setDlg').close(); toast('AI設定を保存しました'); }
function aiBanner(msg){ const b = $('aiBanner'); if(msg == null){ b.classList.add('hidden'); } else { b.classList.remove('hidden'); b.textContent = msg; } }

/* ===== 教材のAI解析 → units.json ===== */
let analyzing = false;
async function analyzeBook(book){
  if(analyzing || !book) return;
  const apiKey = getApiKey();
  if(!apiKey){ toast('先に ⚙AI設定 でAPIキーを入れてね'); openSettings(); return; }
  if(!book.sourcePageIds?.length){ toast('問題ページがありません'); return; }
  if(book.structured && !confirm(`「${book.title}」を解析しなおしますか？`)) return;
  analyzing = true;
  const opts = { apiKey, model: getModel() };
  try{
    const units = []; let honbun = []; const CH = 6;
    // 1) 問題構造
    for(let off=0; off<book.sourcePageIds.length; off+=CH){
      const grp = book.sourcePageIds.slice(off, off+CH);
      aiBanner(`📖 問題を読み取り中… ${Math.min(off+CH, book.sourcePageIds.length)}/${book.sourcePageIds.length}ページ`);
      const imgs = []; for(const id of grp) imgs.push({ base64: await readBase64(id), mediaType:'image/jpeg' });
      const pages = await detectStructure(imgs, opts);
      pages.forEach(pg => {
        const pid = grp[(pg.index||1)-1] || grp[0];
        if(pg.skip) return;
        if(pg.honbun){ honbun.push(pid); return; }
        (pg.daimons||[]).forEach(d => {
          const subs = (d.subs && d.subs.length) ? d.subs : [{ label:'' }];
          units.push({ id: newId('u'), bookId: book.id, label: d.label||'もんだい', category: d.category||'', tags: d.tags||[],
            pageId: pid, refPages: honbun.slice(),
            items: subs.map(s => ({ label:s.label||'', question:s.question||'', evidence:s.evidence||'', answer:'', kind:'value', conf:1, points:[] })) });
        });
      });
    }
    // 2) 解答の読み取り
    if(book.answerPageIds?.length){
      const CH2 = 8;
      for(let off=0; off<book.answerPageIds.length; off+=CH2){
        const grp = book.answerPageIds.slice(off, off+CH2);
        aiBanner(`✓ 答えを読み取り中… ${Math.min(off+CH2, book.answerPageIds.length)}/${book.answerPageIds.length}ページ`);
        const imgs = []; for(const id of grp) imgs.push({ base64: await readBase64(id), mediaType:'image/jpeg' });
        const unitList = units.map(u => ({ name: u.label, items: u.items }));
        let answers = [];
        try{ answers = await extractAnswers(unitList, imgs, opts); }catch(e){ console.warn('解答チャンク失敗', e); continue; }
        answers.forEach(a => {
          const u = units[a.daimon-1]; if(!u) return;
          const it = u.items[a.sub-1]; if(!it) return;
          if(a.kind) it.kind = a.kind;
          if(Array.isArray(a.points) && a.points.length) it.points = a.points.slice(0,4);
          if(a.kind==='figure'){
            if(a.page>0 && a.box && a.box.w>0){ const fp = grp[a.page-1]; if(fp) it.figRef = { assetId: fp, box: a.box }; }
            it.answer = a.answer || it.answer || '図で答える'; it.conf = (typeof a.confidence==='number') ? a.confidence : 1;
          } else if(a.answer){ it.answer = a.answer; it.conf = (typeof a.confidence==='number') ? a.confidence : 1; }
        });
      }
    }
    // 空のユニット（例題などで中身が取れなかったもの）を除去
    const cleaned = units.filter(u => (u.items||[]).some(it => (it.label||'').trim() || (it.answer||'').trim() || (it.question||'').trim()));
    units.length = 0; units.push(...cleaned);
    // 3) units.json にこの本の分を反映（置換）
    aiBanner('💾 保存中…');
    const uj = await loadOrInitJSON(libFolderId, 'units.json', { units: [] });
    const others = (uj.data.units||[]).filter(u => u.bookId !== book.id);
    await writeJSON(uj.id, { units: [...others, ...units] });
    book.structured = true; book.unitCount = units.length;
    await writeJSON(booksFileId, { books });
    renderBooks();
    toast(`「${book.title}」を解析しました（${units.length}問）`);
  }catch(e){ alert('AI解析に失敗: ' + e.message); }
  finally{ analyzing = false; aiBanner(null); }
}

// 取り込み：①ファイル→画像変換 → ②プレビューで不要ページ除外 → ③残りをDrive保存
let pend = null;
async function prepareImport(){
  if(importing) return;
  const title = $('bTitle').value.trim();
  const files = $('bFiles').files, ansFiles = $('bAnsFiles').files;
  if(!title){ $('bErr').textContent='教材の名前を いれてね'; return; }
  if(!files.length){ $('bErr').textContent='もんだいのファイルを えらんでね'; return; }
  importing = true; $('bImpGo').disabled = true; $('bErr').textContent='';
  try{
    let n = 0; const onP = () => { $('bProg').textContent = `ページを画像に変換中… ${++n}枚`; };
    const prob = (await filesToPages(files, onP)).map(p => ({ ...p, inc:true }));
    const ans  = (await filesToPages(ansFiles, onP)).map(p => ({ ...p, inc:true }));
    pend = { title, subject:$('bSubject').value, type:$('bType').value, prob, ans };
    $('bookDlg').close();
    showPreview();
  }catch(e){ $('bErr').textContent = '変換失敗: ' + e.message; }
  finally{ importing = false; $('bImpGo').disabled = false; $('bProg').textContent=''; }
}

function renderPvGrid(id, arr){
  const g = $(id); g.innerHTML = '';
  arr.forEach((p, i) => {
    const d = document.createElement('div'); d.className = 'pvthumb' + (p.inc ? '' : ' ex');
    d.innerHTML = `<span class="pnum">${i+1}</span><img src="data:image/jpeg;base64,${p.base64}">`;
    d.onclick = () => { p.inc = !p.inc; d.classList.toggle('ex', !p.inc); updatePvGo(); };
    g.appendChild(d);
  });
}
function updatePvGo(){
  const n = pend.prob.filter(p=>p.inc).length, a = pend.ans.filter(p=>p.inc).length;
  $('pvGo').textContent = `この ${n}${a?`＋${a}`:''}ページで とうろく`;
}
function showPreview(){
  $('pvTitle').textContent = `「${pend.title}」ページの かくにん`;
  renderPvGrid('pvProb', pend.prob);
  renderPvGrid('pvAns', pend.ans);
  $('pvAnsTitle').style.display = pend.ans.length ? '' : 'none';
  $('importPreview').classList.remove('hidden');
  updatePvGo();
}
async function confirmImport(){
  if(importing || !pend) return;
  importing = true; $('pvGo').disabled = true;
  try{
    const bookId = newId('b');
    const prob = pend.prob.filter(p=>p.inc), ans = pend.ans.filter(p=>p.inc);
    const total = prob.length + ans.length; let done = 0;
    const srcIds = [];
    for(let i=0;i<prob.length;i++){ const f = await createBinaryFile(`${bookId}_p${i+1}.jpg`, assetsFolderId, prob[i].base64, 'image/jpeg'); srcIds.push(f.id); aiBanner(`💾 Driveへ保存中… ${++done}/${total}`); }
    const ansIds = [];
    for(let i=0;i<ans.length;i++){ const f = await createBinaryFile(`${bookId}_a${i+1}.jpg`, assetsFolderId, ans[i].base64, 'image/jpeg'); ansIds.push(f.id); aiBanner(`💾 Driveへ保存中… ${++done}/${total}`); }
    const book = { id:bookId, title:pend.title, subject:pend.subject, type:pend.type, sourcePageIds:srcIds, answerPageIds:ansIds, structured:false, status:'pages', createdAt: today() };
    books.push(book); await writeJSON(booksFileId, { books });
    renderBooks(); $('importPreview').classList.add('hidden'); pend = null;
    toast(`とうろくしました（もんだい${srcIds.length}ページ）`);
  }catch(e){ alert('とうろく失敗: ' + e.message); }
  finally{ importing = false; $('pvGo').disabled = false; aiBanner(null); }
}
