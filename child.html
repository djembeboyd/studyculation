<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>こどもページ</title>
<style>
  :root{ --bg:#fff7ef; --card:#fff; --line:#f0e2d4; --ink:#3a2a1c; --mut:#a08a76; --accent:#ff8c42; }
  *{box-sizing:border-box}
  body{font-family:system-ui,-apple-system,"Hiragino Maru Gothic ProN","Hiragino Kaku Gothic ProN",sans-serif;margin:0;background:var(--bg);color:var(--ink);-webkit-tap-highlight-color:transparent}
  .wrap{max-width:820px;margin:0 auto;padding:20px;min-height:100vh}
  .center{min-height:84vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;text-align:center}
  button{font-family:inherit;cursor:pointer;border:none}
  .big{font-size:20px;font-weight:800;background:var(--accent);color:#fff;padding:16px 30px;border-radius:16px}
  .muted{color:var(--mut);font-size:15px}
  .hidden{display:none!important}
  h2{font-size:22px;text-align:center;margin:10px 0 22px}
  .people{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:18px;max-width:620px;margin:0 auto}
  .person{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:22px 12px;display:flex;flex-direction:column;align-items:center;gap:12px}
  .person:active{transform:scale(.97)}
  .face{width:90px;height:90px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:40px}
  .pname{font-size:19px;font-weight:800}
  .lock{font-size:12px;color:var(--mut)}
  /* PIN */
  .modal{position:fixed;inset:0;background:rgba(40,28,18,.45);display:flex;align-items:center;justify-content:center;z-index:20}
  .pin{background:#fff;border-radius:22px;padding:24px;width:300px;text-align:center}
  .pin h3{margin:0 0 4px}
  .dots{display:flex;gap:12px;justify-content:center;margin:16px 0}
  .dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--accent)}
  .dot.on{background:var(--accent)}
  .keys{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .keys button{font-size:22px;font-weight:800;padding:14px;border-radius:14px;background:#fff3ea;color:var(--ink)}
  .keys button.wide{grid-column:span 1}
  .pinmsg{color:#e8604c;font-size:14px;min-height:18px}
  /* home */
  .home-top{display:flex;align-items:center;gap:14px;margin-bottom:18px}
  .home-top .face{width:56px;height:56px;font-size:26px}
  .home-top .hi{font-size:20px;font-weight:800}
  .changeBtn{margin-left:auto;background:#fff;border:1px solid var(--line);border-radius:12px;padding:8px 12px;font-size:14px;color:var(--mut)}
  .todo{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:28px;text-align:center}
  .todo .em{font-size:50px}
  .todo .t{font-size:19px;font-weight:800;margin-top:8px}
  .err{color:#e8604c;font-size:14px}
  /* study */
  .study-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .study-top .nm{font-weight:800;font-size:18px}
  .study-top .cnt{margin-left:auto;color:var(--mut);font-size:15px}
  .refimg{width:100%;border:1px solid var(--line);border-radius:10px;margin-bottom:8px}
  .sheet{position:relative;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff}
  .sheet img{display:block;width:100%}
  .sheet canvas{position:absolute;left:0;top:0;width:100%;height:100%;touch-action:none}
  .tools{display:flex;gap:8px;margin:10px 0}
  .tools button{flex:1;padding:11px;border-radius:10px;background:#fff;border:1px solid var(--line);font-size:15px;font-weight:700}
  .tools button.on{background:#fff3ea;border-color:var(--accent);color:var(--accent)}
  .bigbtn{width:100%;padding:15px;border-radius:14px;background:var(--accent);color:#fff;font-weight:800;font-size:18px;margin-top:10px;border:none}
  .gcard{border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:10px;background:#fff}
  .gcard .gqq{font-weight:800;font-size:15px}
  .gcard .gevi{font-size:13px;line-height:1.55;color:#33536b;background:#eef4f9;border-radius:8px;padding:6px 9px;margin:5px 0}
  .gcard .gans2{font-size:14px;margin:3px 0}
  .gcard .gpts{font-size:12px;color:var(--mut);margin-top:1px}
  .gcard .gbtns{display:flex;gap:8px;margin-top:8px}
  .gcard .gbtns button{flex:1;height:46px;border-radius:10px;font-weight:900;font-size:21px;border:2px solid var(--line);background:#fff;color:var(--mut)}
  .gcard .gbtns .o-on{background:#37b87c;color:#fff;border-color:#37b87c}
  .gcard .gbtns .h-on{background:#f0a500;color:#fff;border-color:#f0a500}
  .gcard .gbtns .x-on{background:#e8604c;color:#fff;border-color:#e8604c}
</style>
</head>
<body>
<div class="wrap">
  <!-- 未ログイン（タブレット側で一度だけ） -->
  <section id="vLogin" class="center">
    <div style="font-size:54px">🧒</div>
    <div class="muted">はじめに おうちの人が ログインしてね</div>
    <button class="big" id="bIn">Googleで ログイン</button>
    <div class="err" id="loginErr"></div>
  </section>

  <!-- だれが学習する -->
  <section id="vSelect" class="hidden">
    <h2>だれが がくしゅうする？</h2>
    <div class="people" id="people"></div>
    <p class="muted" style="text-align:center;margin-top:24px" id="noChild"></p>
  </section>

  <!-- 学習画面 -->
  <section id="vStudy" class="hidden">
    <div class="study-top">
      <button class="changeBtn" id="bQuit">やめる</button>
      <div class="nm" id="stName"></div>
      <div class="cnt" id="stCnt"></div>
    </div>
    <div id="stRefs"></div>
    <div class="sheet" id="stSheet"><img id="stImg" alt=""><canvas id="stCanvas"></canvas></div>
    <div id="stAnswerHint" class="hidden"></div>
    <div class="tools" id="stTools">
      <button id="tPen" class="on">✏️ ペン</button>
      <button id="tUndo">⌫ もどす</button>
      <button id="tClear">🧹 ぜんぶけす</button>
    </div>
    <button class="bigbtn" id="bCheck">こたえあわせ</button>
    <div id="stGrade" class="hidden"></div>
  </section>

  <!-- 子のホーム（完了/お知らせ） -->
  <section id="vHome" class="hidden">
    <div class="home-top">
      <div class="face" id="hFace"></div>
      <div class="hi" id="hHi"></div>
      <button class="changeBtn" id="bChange">ひとを かえる</button>
    </div>
    <div class="todo">
      <div class="em">📚</div>
      <div class="t" id="todoMsg">きょうの がくしゅう</div>
      <p class="muted" id="todoSub"></p>
    </div>
  </section>
</div>

<!-- PIN -->
<div class="modal hidden" id="pinModal">
  <div class="pin">
    <h3 id="pinName"></h3>
    <div class="muted">あいことば（4けた）</div>
    <div class="dots" id="dots"></div>
    <div class="keys" id="keys"></div>
    <div class="pinmsg" id="pinMsg"></div>
    <button style="margin-top:12px;background:none;color:var(--mut);font-size:14px" id="pinCancel">やめる</button>
  </div>
</div>

<script type="module">
import { CONFIG } from './core/config.js';
import { initAuth, requestToken, hasToken } from './core/auth.js';
import { loadOrInitJSON, ensureFolder, writeJSON, readBase64 } from './core/drive.js';
import { emptyFamily, getChild } from './core/family.js';
import { startSession, submit, nextAttempt, finishSession } from './core/study.js';
import { today, freshState } from './core/sm2.js';

const $ = (id)=>document.getElementById(id);
let family=null, pinTarget=null, pinBuf='';

function initials(n){ return (n||'?').trim().slice(0,1); }
function toast(msg){ let t=document.getElementById('toast'); if(!t){ t=document.createElement('div'); t.id='toast'; t.style.cssText='position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#3a2a1c;color:#fff;padding:12px 20px;border-radius:12px;font-size:16px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:60;max-width:90%;text-align:center'; document.body.appendChild(t); } t.textContent=msg; t.style.opacity='1'; clearTimeout(t._t); t._t=setTimeout(()=>{ t.style.opacity='0'; },1900); }

function show(view){ ['vLogin','vSelect','vStudy','vHome'].forEach(v=>$(v).classList.toggle('hidden', v!==view)); }

function renderPeople(){
  const wrap=$('people'); wrap.innerHTML='';
  const kids=family.children||[];
  $('noChild').textContent = kids.length? '' : 'まだ こどもが とうろくされていません。おうちの人ページで ふやしてね。';
  kids.forEach(c=>{
    const b=document.createElement('button'); b.className='person';
    b.innerHTML=`<div class="face" style="background:${c.color||'#888'}">${initials(c.name)}</div>
      <div class="pname">${c.name}</div>${c.pin?'<div class="lock">🔒 あいことば</div>':''}`;
    b.onclick=()=> c.pin ? openPin(c) : enterChild(c);
    wrap.appendChild(b);
  });
}

function enterChild(c){ startStudy(c).catch(e=>{ alert('読み込みに失敗: '+e.message); show('vSelect'); }); }

/* ===== 学習セッション（子＝答えるだけ／結果確認／やり直し。採点は親） ===== */
let sChild=null, sLib={books:[],units:[]}, sBookById={};
let sProgress, sProgId, sReviews, sReviewsId, sWorks, sWorksId;
let sQueue=[], sIdx=0, sStrokes=[], sSession=null;
let curStroke=null, drawing=false;

function childSettings(c){ const s=(family&&family.settings)||{}; const o=(c&&c.settingsOverride)||{};
  return { cap:o.cap||s.cap||15, newpd:o.newpd||s.newpd||6, grad:o.grad||s.grad||30 }; }
function currentItem(){ return sQueue[sIdx]; }
function currentUnit(){ const it=currentItem(); return it && sLib.units.find(u=>u.id===it.unitId); }
async function assetUrl(id){ if(window.__assetOverride) return window.__assetOverride; return 'data:image/jpeg;base64,'+await readBase64(id); }
async function persist(){ if(window.__assetOverride) return; await writeJSON(sProgId,sProgress); await writeJSON(sReviewsId,sReviews); await writeJSON(sWorksId,sWorks); }

async function startStudy(c){
  sChild=c; show('vStudy'); $('stName').textContent=c.name; $('stRefs').innerHTML=''; $('stGrade').classList.add('hidden');
  const lib=await ensureFolder(CONFIG.ROOT_FOLDER_ID,'library');
  const bj=await loadOrInitJSON(lib.id,'books.json',{books:[]});
  const uj=await loadOrInitJSON(lib.id,'units.json',{units:[]});
  sLib={ books:bj.data.books||[], units:uj.data.units||[] };
  sBookById={}; sLib.books.forEach(b=>sBookById[b.id]=b);
  const childrenF=await ensureFolder(CONFIG.ROOT_FOLDER_ID,'children');
  const cf=await ensureFolder(childrenF.id, c.id);
  const pj=await loadOrInitJSON(cf.id,'progress.json',{units:{}}); sProgress=pj.data; sProgId=pj.id; if(!sProgress.units)sProgress.units={};
  const rj=await loadOrInitJSON(cf.id,'reviews.json',{reviews:[]}); sReviews=rj.data; sReviewsId=rj.id; if(!sReviews.reviews)sReviews.reviews=[];
  const wj=await loadOrInitJSON(cf.id,'works.json',{works:[]}); sWorks=wj.data; sWorksId=wj.id; if(!sWorks.works)sWorks.works=[];
  buildChildQueue();
  sIdx=0;
  if(!sQueue.length){ showDone(true); return; }
  await showCurrent();
}

// 子がいま操作する対象：結果確認（親採点済み）→やり直し→新規 の順。pending(親採点まち)は出さない。
function buildChildQueue(){
  const st=childSettings(sChild); const assigned=sChild.assignedBooks||[]; const now=today();
  const allowed=u=> assigned.length===0 || assigned.includes(u.bookId);
  const results=[], answers=[], fresh=[];
  for(const u of sLib.units){ if(!allowed(u))continue;
    const p=sProgress.units[u.id]; const sess=p&&p.session;
    if(sess){ if(sess.phase==='result') results.push(u.id); else if(sess.phase==='answering') answers.push(u.id); /* pending→skip */ }
    else if(!p) fresh.push(u.id);
    else if(p.state!=='graduated' && p.due<=now) answers.push(u.id);
  }
  let q=[ ...results.map(id=>({unitId:id,mode:'result'})),
          ...answers.map(id=>({unitId:id,mode:'answer'})),
          ...fresh.slice(0,st.newpd).map(id=>({unitId:id,mode:'answer'})) ];
  if(q.length>st.cap) q=q.slice(0,st.cap);
  sQueue=q;
}

async function showCurrent(){
  if(sIdx>=sQueue.length){ showDone(false); return; }
  $('stCnt').textContent=`${sIdx+1} / ${sQueue.length}`;
  if(currentItem().mode==='result') return showResult();
  return showAnswer();
}

// 答える画面（答え非表示。3回目だけ答え表示）
async function showAnswer(){
  const u=currentUnit(); const p=sProgress.units[u.id]||{};
  sSession = p.session || startSession(u.items.length);
  sStrokes=[];
  $('stTools').style.display='flex'; $('tPen').classList.add('on');
  $('bCheck').textContent = sSession.showAnswer ? 'できた（ていしゅつ）' : 'ていしゅつ'; $('bCheck').classList.remove('hidden');
  $('stGrade').classList.add('hidden'); $('stGrade').innerHTML='';
  $('stAnswerHint').classList.add('hidden'); $('stAnswerHint').innerHTML='';   // ←答えは既定で非表示
  $('stRefs').innerHTML='';
  for(const rid of (u.refPages||[])){ const im=new Image(); im.className='refimg'; im.src=await assetUrl(rid); $('stRefs').appendChild(im); }
  if(sSession.showAnswer){   // 3回目だけ・問題の直下に答えを表示
    const cards=u.items.map((it,i)=> sSession.resolved[i] ? '' :
      `<div class="gcard"><div class="gqq">${it.label||('('+(i+1)+')')}</div>
        <div class="gans2">✓ こたえ：${it.kind==='figure'?'（図・解答ページ）':(it.answer||'')}</div>
        ${(it.figRef&&it.figRef.assetId)?`<img id="figc${i}" alt="" style="max-height:64px;border-radius:6px;border:1px solid #e0e0e0;margin-top:4px">`:''}</div>`).join('');
    $('stAnswerHint').innerHTML=`<div class="muted" style="text-align:center;margin:8px 0">3かいめ：こたえを見て なおそう</div>${cards}`;
    $('stAnswerHint').classList.remove('hidden');
    u.items.forEach(async(it,i)=>{ if(it.figRef&&it.figRef.assetId){ const d=await cropAsset(it.figRef.assetId,it.figRef.box); const el=document.getElementById('figc'+i); if(el&&d)el.src=d; } });
  }
  const img=$('stImg'); img.onload=setupCanvas; img.src=await assetUrl(u.pageId);
  window.scrollTo(0,0);
}

// 提出 → 未採点(pending)にして次へ
async function onSubmit(){
  const u=currentUnit();
  const work={ unitId:u.id, page:0, strokes:sStrokes, stamps:[], attempt:sSession.attempt, updatedAt:today() };
  const wi=sWorks.works.findIndex(w=>w.unitId===u.id); if(wi>=0)sWorks.works[wi]=work; else sWorks.works.push(work);
  sSession = submit(sSession);
  const prev = sProgress.units[u.id] || freshState();
  sProgress.units[u.id] = { ...prev, session: sSession };
  try{ await persist(); }catch(e){ alert('保存に失敗: '+e.message); return; }
  toast('ていしゅつしました！おうちの人が みてくれるよ');
  sIdx++; await showCurrent();
}

// 結果確認（親採点済み）。○は正解確認、✕はやり直しへ
async function showResult(){
  const u=currentUnit(); sSession=sProgress.units[u.id].session;
  $('stTools').style.display='none'; $('bCheck').classList.add('hidden');
  $('stAnswerHint').classList.add('hidden'); $('stAnswerHint').innerHTML='';
  const cards=u.items.map((it,i)=>`<div class="gcard"><div class="gqq">${it.label||('('+(i+1)+')')}　${
    sSession.resolved[i] ? '<span style="color:#37b87c;font-weight:800">◯ せいかい！</span>' : '<span style="color:#e8604c;font-weight:800">✕ もういちど</span>'
  }</div></div>`).join('');
  const allRight=sSession.resolved.every(Boolean);
  const wrongN=sSession.resolved.filter(x=>!x).length;
  const btn = sSession.complete
    ? `<button class="bigbtn" onclick="window.__finish()">おわり！${allRight?' ぜんぶせいかい🎉':''}</button>`
    : `<button class="bigbtn" onclick="window.__redo()">まちがいを なおす（${wrongN}もん）</button>`;
  $('stGrade').innerHTML=`<div class="muted" style="text-align:center;margin:8px 0">おうちの人が さいてんしたよ</div>${cards}${btn}`;
  $('stGrade').classList.remove('hidden');
  const img=$('stImg'); img.onload=()=>{ const w=(sWorks.works.find(x=>x.unitId===u.id)||{}).strokes||[]; drawStrokes(w); }; img.src=await assetUrl(u.pageId);
  window.scrollTo(0,0);
}
window.__finish=async()=>{
  const u=currentUnit(); const b=sBookById[u.bookId]||{}; const st=childSettings(sChild);
  const { state, review }=finishSession(sProgress.units[u.id], u.items, sSession, { bookType:b.type||'reps', grad:st.grad });
  const ns={ ...state }; delete ns.session;
  sProgress.units[u.id]=ns;
  sReviews.reviews.push({ unitId:u.id, ...review });
  try{ await persist(); }catch(e){ alert('保存に失敗: '+e.message); return; }
  sIdx++; await showCurrent();
};
window.__redo=async()=>{
  const u=currentUnit(); sSession=nextAttempt(sSession);
  sProgress.units[u.id]={ ...sProgress.units[u.id], session:sSession };
  try{ await persist(); }catch(e){ alert('保存に失敗: '+e.message); return; }
  sQueue[sIdx]={ unitId:u.id, mode:'answer' }; await showAnswer();
};

/* --- お絵かき（正規化座標） --- */
function setupCanvas(){ const img=$('stImg'), cv=$('stCanvas'); cv.width=img.clientWidth; cv.height=img.clientHeight; drawStrokes(sStrokes); }
function drawStrokes(strokes){
  const cv=$('stCanvas'), ctx=cv.getContext('2d'); ctx.clearRect(0,0,cv.width,cv.height);
  for(const s of (strokes||[])){ ctx.strokeStyle=s.color||'#1b66c9'; ctx.lineWidth=s.width||3; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.beginPath();
    (s.points||[]).forEach((p,i)=>{ const x=p[0]*cv.width, y=p[1]*cv.height; i?ctx.lineTo(x,y):ctx.moveTo(x,y); }); ctx.stroke(); }
  if(curStroke){ ctx.strokeStyle=curStroke.color; ctx.lineWidth=curStroke.width; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.beginPath();
    curStroke.points.forEach((p,i)=>{ const x=p[0]*cv.width, y=p[1]*cv.height; i?ctx.lineTo(x,y):ctx.moveTo(x,y); }); ctx.stroke(); }
}
function redraw(){ drawStrokes(sStrokes); }
function ptFromEvent(e){ const cv=$('stCanvas'), r=cv.getBoundingClientRect(); const t=e.touches?e.touches[0]:e; return [ (t.clientX-r.left)/r.width, (t.clientY-r.top)/r.height ]; }
function onDown(e){ if(currentItem()&&currentItem().mode==='result')return; e.preventDefault(); drawing=true; curStroke={ color:'#1b66c9', width:3, points:[ptFromEvent(e)] }; redraw(); }
function onMove(e){ if(!drawing)return; e.preventDefault(); curStroke.points.push(ptFromEvent(e)); redraw(); }
function onUp(){ if(!drawing)return; drawing=false; if(curStroke&&curStroke.points.length>1)sStrokes.push(curStroke); curStroke=null; redraw(); }

async function cropAsset(assetId,box){
  if(!box)return null; const url=await assetUrl(assetId);
  return await new Promise(res=>{ const img=new Image(); img.onload=()=>{ const c=document.createElement('canvas');
    const sx=box.x*img.naturalWidth, sy=box.y*img.naturalHeight, sw=Math.max(1,box.w*img.naturalWidth), sh=Math.max(1,box.h*img.naturalHeight);
    c.width=sw; c.height=sh; c.getContext('2d').drawImage(img,sx,sy,sw,sh,0,0,sw,sh); res(c.toDataURL('image/jpeg',0.85)); };
    img.onerror=()=>res(null); img.src=url; });
}

function showDone(empty){
  $('hFace').style.background=(sChild&&sChild.color)||'#888'; $('hFace').textContent=initials(sChild?sChild.name:'');
  $('hHi').textContent=empty?`${sChild?sChild.name:''}、こんにちは`:`${sChild?sChild.name:''}、おつかれさま！`;
  $('todoMsg').textContent=empty?'いまは やる もんだいが ないよ':'きょうのぶん おわり！🎉';
  $('todoSub').textContent=empty?'おうちの人の さいてんまちか、ぜんぶ おわったよ。':'よく がんばりました。';
  show('vHome');
}

/* ---- PIN ---- */
function openPin(c){ pinTarget=c; pinBuf=''; $('pinName').textContent=c.name; $('pinMsg').textContent=''; renderPin(); $('pinModal').classList.remove('hidden'); }
function closePin(){ $('pinModal').classList.add('hidden'); pinTarget=null; pinBuf=''; }
function renderPin(){
  const dots=$('dots'); dots.innerHTML='';
  for(let i=0;i<4;i++){ const d=document.createElement('div'); d.className='dot'+(i<pinBuf.length?' on':''); dots.appendChild(d); }
}
function pinPress(k){
  if(k==='del'){ pinBuf=pinBuf.slice(0,-1); renderPin(); return; }
  if(pinBuf.length>=4) return;
  pinBuf+=k; renderPin();
  if(pinBuf.length===4){
    if(pinBuf===pinTarget.pin){ const c=pinTarget; closePin(); enterChild(c); }
    else { $('pinMsg').textContent='ちがうみたい'; pinBuf=''; setTimeout(renderPin,400); }
  }
}
function buildKeys(){
  const keys=$('keys'); keys.innerHTML='';
  ['1','2','3','4','5','6','7','8','9'].forEach(n=>{ const b=document.createElement('button'); b.textContent=n; b.onclick=()=>pinPress(n); keys.appendChild(b); });
  const sp=document.createElement('span'); keys.appendChild(sp);
  const z=document.createElement('button'); z.textContent='0'; z.onclick=()=>pinPress('0'); keys.appendChild(z);
  const del=document.createElement('button'); del.textContent='⌫'; del.onclick=()=>pinPress('del'); keys.appendChild(del);
}

async function loadSelect(){
  const { data } = await loadOrInitJSON(CONFIG.ROOT_FOLDER_ID, 'family.json', emptyFamily());
  family=data; if(!family.children) family.children=[];
  // 子ごとの直リンク（?child=<id>）＝プロフィール選択もPINも無しで直行（別端末用）
  const cid=new URLSearchParams(location.search).get('child');
  if(cid){ const c=family.children.find(x=>x.id===cid); if(c){ enterChild(c); return; } }
  renderPeople(); show('vSelect');
}

$('bIn').onclick=async()=>{
  $('loginErr').textContent='';
  try{
    if(!CONFIG.GOOGLE_CLIENT_ID){ $('loginErr').textContent='config.js に CLIENT_ID 未設定'; return; }
    await initAuth(CONFIG.GOOGLE_CLIENT_ID, CONFIG.DRIVE_SCOPE);
    await requestToken({ prompt: hasToken()?'':'consent' });
    await loadSelect();
  }catch(e){ $('loginErr').textContent='ログイン失敗: '+e.message; }
};
$('bChange').onclick=()=>show('vSelect');
$('pinCancel').onclick=closePin;
buildKeys();

/* 学習画面の操作 */
$('bCheck').onclick=onSubmit;
$('bQuit').onclick=()=>{ if(confirm('やめる？ かいた ものは ほぞんされないよ')) show('vSelect'); };
$('tPen').onclick=()=>$('tPen').classList.add('on');
$('tUndo').onclick=()=>{ sStrokes.pop(); redraw(); };
$('tClear').onclick=()=>{ sStrokes=[]; redraw(); };
(()=>{ const cv=$('stCanvas');
  cv.addEventListener('pointerdown',onDown); cv.addEventListener('pointermove',onMove); window.addEventListener('pointerup',onUp);
  window.addEventListener('resize',()=>{ if(!$('vStudy').classList.contains('hidden'))setupCanvas(); });
})();
